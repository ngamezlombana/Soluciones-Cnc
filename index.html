document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

:0;font:400 15px/1.7;color:#b7b3ab\">Desde el dominio operativo hasta la gerencia de plantas con más de <span style=\"color:#f5f3ef;font-weight:600\">120 colaboradores<\u002Fspan>. Entiendo la física del corte y la lógica binaria detrás del control numérico.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:20px\">\n          <div style=\"border:1px solid rgba(255,255,255,.1);padding:26px 22px\"><div style=\"font:600 10px;letter-spacing:.08em;text-transform:uppercase;color:#d9b876;margin-bottom:10px\">Hito 2025<\u002Fdiv><p style=\"margin:0;font:400 13px/1.6;color:#a9a59d\">Grado de Ingeniería a los 55 años, demostrando resiliencia y actualización tecnológica constante.<\u002Fp><\u002Fdiv>\n          <div style=\"border:1px solid rgba(255,255,255,.1);padding:26px 22px\"><div style=\"font:600 10px;letter-spacing:.08em;text-transform:uppercase;color:#d9b876;margin-bottom:10px\">Especialidad<\u002Fdiv><p style=\"margin:0;font:400 13px/1.6;color:#a9a59d\">Diseño de moldes de alta precisión y optimización Lean Manufacturing.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"position:relative;padding-left:8px\">\n        <div style=\"position:absolute;left:16px;top:6px;bottom:6px;width:1px;background:rgba(255,255,255,.1)\"><\u002Fdiv>\n        <sc-for list=\"{{ timeline }}\" as=\"item\" hint-placeholder-count=\"3\">\n          <div ref=\"{{ item.setRef }}\" style=\"position:relative;padding:0 0 40px 40px;opacity:0;transform:translateY(20px);transition:opacity .6s ease,transform .6s ease\">\n            <div style=\"position:absolute;left:8px;top:2px;width:17px;height:17px;border-radius:50%;background:#15181c;border:2px solid {{ item.dotColor }};display:flex;align-items:center;justify-content:center\"><div style=\"width:6px;height:6px;border-radius:50%;background:{{ item.dotColor }}\"><\u002Fdiv><\u002Fdiv>\n            <span style=\"font:600 10px;letter-spacing:.08em;text-transform:uppercase;color:{{ item.dotColor }}\">{{ item.stage }}<\u002Fspan>\n            <h4 style=\"margin:8px 0 8px;font:500 18px 'Source Serif 4',serif;color:#f5f3ef\">{{ item.title }}<\u002Fh4>\n            <p style=\"margin:0;font:400 14px/1.7;color:#a9a59d\">{{ item.body }}<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- CONTACTO -->\n  <section id=\"contacto\" style=\"padding:9vw 5vw;text-align:center\">\n    <h2 style=\"margin:0 0 16px;font:500 clamp(28px,4vw,38px)/1.2 'Source Serif 4',serif;color:#f5f3ef\">Inicie la optimización<\u002Fh2>\n    <p style=\"margin:0 0 44px;font:400 16px;color:#a9a59d\">Elija el canal de su preferencia para una evaluación técnica inmediata.<\u002Fp>\n    <div style=\"display:flex;flex-wrap:wrap;justify-content:center;gap:24px;max-width:700px;margin:0 auto\">\n      <a href=\"{{ waLink }}\" target=\"_blank\" rel=\"noopener\" style=\"flex:1;min-width:260px;display:flex;flex-direction:column;align-items:center;gap:16px;padding:40px 30px;border:1px solid rgba(76,175,110,.3);background:rgba(76,175,110,.06);text-decoration:none;transition:background .2s\" style-hover=\"background:rgba(76,175,110,.12)\">\n        <svg width=\"34\" height=\"34\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#4fae6e\" stroke-width=\"1.6\"><path d=\"M20 12a8 8 0 1 1-3.8-6.8\"><\u002Fpath><path d=\"M20 4v5h-5\"><\u002Fpath><\u002Fsvg>\n        <div><div style=\"font:500 19px 'Source Serif 4',serif;color:#f5f3ef;margin-bottom:6px\">WhatsApp<\u002Fdiv><div style=\"font:600 11px;letter-spacing:.06em;text-transform:uppercase;color:#7fc79a\">Respuesta en minutos<\u002Fdiv><\u002Fdiv>\n      <\u002Fa>\n      <a href=\"mailto:{{ email }}\" onclick=\"{{ onCopyEmail }}\" style=\"flex:1;min-width:260px;display:flex;flex-direction:column;align-items:center;gap:16px;padding:40px 30px;border:1px solid rgba(217,184,118,.3);background:rgba(217,184,118,.06);text-decoration:none;cursor:pointer;transition:background .2s\" style-hover=\"background:rgba(217,184,118,.12)\">\n        <svg width=\"34\" height=\"34\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#d9b876\" stroke-width=\"1.6\"><rect x=\"3\" y=\"5\" width=\"18\" height=\"14\" rx=\"2\"><\u002Frect><path d=\"m3 7 9 6 9-6\"><\u002Fpath><\u002Fsvg>\n        <div><div style=\"font:500 19px 'Source Serif 4',serif;color:#f5f3ef;margin-bottom:6px\">Email Corporativo<\u002Fdiv><div style=\"font:600 11px;letter-spacing:.06em;text-transform:uppercase;color:#d9b876\">{{ email }}<\u002Fdiv><\u002Fdiv>\n      <\u002Fa>\n    <\u002Fdiv>\n    <div style=\"margin-top:56px;font:500 11px;letter-spacing:.12em;color:#7a766e;text-transform:uppercase\">Cali, Colombia · Consultoría Global<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FOOTER -->\n  <footer style=\"padding:36px 5vw;border-top:1px solid rgba(255,255,255,.08);display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:20px\">\n    <div style=\"font:600 13px/1 'Source Serif 4',serif;color:#c9c5bc\">Néstor Gámez <span style=\"color:#5f5c56;font-weight:400;margin-left:8px\">© 2026<\u002Fspan><\u002Fdiv>\n    <div style=\"display:flex;gap:22px\">\n      <a href=\"mailto:{{ email }}\" style=\"color:#8b8880;transition:color .2s\" style-hover=\"color:#d9b876\" title=\"Email\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\"><rect x=\"3\" y=\"5\" width=\"18\" height=\"14\" rx=\"2\"><\u002Frect><path d=\"m3 7 9 6 9-6\"><\u002Fpath><\u002Fsvg><\u002Fa>\n      <a href=\"https://linkedin.com/in/nestor-alonso-gamez-lombana-a064a563\" target=\"_blank\" rel=\"noopener\" style=\"color:#8b8880;transition:color .2s\" style-hover=\"color:#d9b876\" title=\"LinkedIn\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\"><rect x=\"3\" y=\"3\" width=\"18\" height=\"18\" rx=\"2\"><\u002Frect><path d=\"M8 11v5M8 8v.01M12 16v-3.2c0-1 .8-1.8 1.8-1.8s1.7.8 1.7 1.8V16\"><\u002Fpath><\u002Fsvg><\u002Fa>\n      <a href=\"{{ waLink }}\" target=\"_blank\" rel=\"noopener\" style=\"color:#8b8880;transition:color .2s\" style-hover=\"color:#d9b876\" title=\"WhatsApp\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\"><path d=\"M20 12a8 8 0 1 1-3.8-6.8\"><\u002Fpath><path d=\"M20 4v5h-5\"><\u002Fpath><\u002Fsvg><\u002Fa>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n  <!-- TOAST -->\n  <div style=\"position:fixed;bottom:36px;left:50%;transform:translateX(-50%) translateY({{ toastOffset }}px);opacity:{{ toastOpacity }};transition:transform .4s ease,opacity .4s ease;background:rgba(21,24,28,.92);border:1px solid rgba(217,184,118,.4);backdrop-filter:blur(8px);padding:14px 26px;font:600 11px/1;letter-spacing:.08em;text-transform:uppercase;color:#f5f3ef;pointer-events:none;z-index:100\">Email copiado al portapapeles<\u002Fdiv>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    videoLoaded: false,\n    toastVisible: false,\n    visibleTimeline: {}\n  };\n\n  timelineData = [\n    { key: 't1', stage: 'Etapa Actual', dotColor: '#d9b876', title: 'Jefe de Producción y Gerencia de Proyectos', body: 'Liderazgo estratégico de plantas industriales, gestión de KPIs, optimización de recursos y dirección de equipos interdisciplinarios de gran escala.' },\n    { key: 't2', stage: 'Consolidación', dotColor: '#8b8880', title: 'Especialista en Programación CNC y Diseño de Moldes', body: 'Evolución hacia la automatización total: programación avanzada de centros y tornos CNC, diseño en SolidWorks/AutoCAD y fabricación de herramental crítico.' },\n    { key: 't3', stage: 'Fundamentos', dotColor: '#8b8880', title: 'Operario de Máquinas Convencionales', body: 'Inicio de carrera dominando la física del corte en tornos paralelos, fresadoras y procesos de soldadura. La base técnica que garantiza el éxito en lo digital.' }\n  ];\n\n  componentDidMount() {\n    this.observer = new IntersectionObserver((entries) => {\n      entries.forEach((entry) => {\n        if (entry.isIntersecting) {\n          entry.target.style.opacity = '1';\n          entry.target.style.transform = 'translateY(0)';\n          this.observer.unobserve(entry.target);\n        }\n      });\n    }, { threshold: 0.2 });\n  }\n\n  componentWillUnmount() {\n    if (this.observer) this.observer.disconnect();\n  }\n\n  attachRef(key) {\n    return (el) => {\n      if (el && this.observer && !el.dataset.observed) {\n        el.dataset.observed = '1';\n        this.observer.observe(el);\n      }\n    };\n  }\n\n  onLoadVideo = () => {\n    if (!this.state.videoLoaded) this.setState({ videoLoaded: true });\n  };\n\n  onCopyEmail = (e) => {\n    e.preventDefault();\n    const email = 'ngamezlombana@gmail.com';\n    const finish = () => {\n      this.setState({ toastVisible: true });\n      setTimeout(() => {\n        this.setState({ toastVisible: false });\n        window.location.href = 'mailto:' + email;\n      }, 2000);\n    };\n    if (navigator.clipboard && navigator.clipboard.writeText) {\n      navigator.clipboard.writeText(email).then(finish).catch(finish);\n    } else {\n      finish();\n    }\n  };\n\n  renderVals() {\n    const email = 'ngamezlombana@gmail.com';\n    const videoId = '5MtDRNnm1VQ';\n    return {\n      email,\n      waLink: 'https://wa.me/573186336965?text=Hola%20N%C3%A9stor%2C%20quisiera%20asesor%C3%ADa%20sobre%20una%20macro%20CNC.',\n      videoId,\n      videoLoaded: this.state.videoLoaded,\n      videoEmbedSrc: 'https://www.youtube.com/embed/' + videoId + '?autoplay=1',\n      onLoadVideo: this.onLoadVideo,\n      onCopyEmail: this.onCopyEmail,\n      toastOpacity: this.state.toastVisible ? 1 : 0,\n      toastOffset: this.state.toastVisible ? 0 : 30,\n      timeline: this.timelineData.map((t) => ({ ...t, setRef: this.attachRef(t.key) }))\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
